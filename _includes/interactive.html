<!-- Scroll-reveal + hover effects. Use class="reveal" on any element to animate it. -->
<style>
  /* Scroll-reveal: hidden until in viewport, then fades + slides up */
  .reveal {
    opacity: 0;
    transform: translateY(24px);
    transition: opacity 0.7s ease, transform 0.7s ease;
    will-change: opacity, transform;
  }
  .reveal.is-visible {
    opacity: 1;
    transform: translateY(0);
  }
  .reveal.delay-1 { transition-delay: 0.1s; }
  .reveal.delay-2 { transition-delay: 0.2s; }
  .reveal.delay-3 { transition-delay: 0.3s; }

  /* Hover-zoom for figures: wrap an <img> in <span class="hover-zoom"> */
  .hover-zoom {
    display: inline-block;
    overflow: hidden;
    border-radius: 6px;
  }
  .hover-zoom img {
    transition: transform 0.4s ease;
    display: block;
  }
  .hover-zoom:hover img {
    transform: scale(1.05);
  }

  /* Smooth scroll for in-page anchors */
  html { scroll-behavior: smooth; }

  /* Subtle lift on the publication cards in the list */
  .archive__item {
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    border-radius: 6px;
  }
  .archive__item:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
  }
</style>

<script>
  (function () {
    if (!('IntersectionObserver' in window)) {
      // Older browsers: just show everything
      document.querySelectorAll('.reveal').forEach(el => el.classList.add('is-visible'));
      return;
    }
    const io = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('is-visible');
          io.unobserve(entry.target);
        }
      });
    }, { threshold: 0.12 });

    document.querySelectorAll('.reveal').forEach(el => io.observe(el));
  })();
</script>
